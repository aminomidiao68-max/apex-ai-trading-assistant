name: Signed Android AAB Release Candidate
on:
  workflow_dispatch:
    inputs:
      release_note:
        description: "Internal release-candidate note"
        required: true
        type: string
permissions:
  contents: read
env:
  APP_VERSION: 3.6.0-release-alpha13
jobs:
  signed-aab:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: android-release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Fail closed unless all upload-key secrets exist
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_B64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
      - name: Materialize upload keystore temporarily
        working-directory: android/app
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          umask 077
          printf '%s' "$KEYSTORE_B64" | base64 --decode > apex-upload-key.jks
          test -s apex-upload-key.jks
      - name: Install Android API 35
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager | head -n1)"; fi
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - name: Build tested and linted signed AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: apex-upload-key.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          APEX_API_BASE_URL: ${{ vars.APEX_API_BASE_URL }}
          APEX_WS_BASE_URL: ${{ vars.APEX_WS_BASE_URL }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --max-workers=2 testReleaseUnitTest lintRelease bundleRelease --stacktrace
      - name: Verify AAB JAR signature
        working-directory: android
        run: |
          AAB="$(find app/build/outputs/bundle/release -type f -name '*.aab' | head -n1)"
          test -s "$AAB"
          jarsigner -verify -strict -verbose "$AAB" >/dev/null
      - name: Generate signed-release provenance
        working-directory: android
        run: |
          AAB="$(find app/build/outputs/bundle/release -type f -name '*.aab' | head -n1)"
          python3 ../backend/scripts/generate_release_manifest.py --apk "$AAB" --output app/build/outputs/bundle/release/release-manifest.json --version "$APP_VERSION" --artifact-type play_upload_aab --production-release-signed
      - name: Upload signed AAB and provenance
        uses: actions/upload-artifact@v7
        with:
          name: apex-signed-play-upload-aab
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/bundle/release/release-manifest.json
          retention-days: 14
      - name: Remove upload key
        if: always()
        run: rm -f android/app/apex-upload-key.jks
