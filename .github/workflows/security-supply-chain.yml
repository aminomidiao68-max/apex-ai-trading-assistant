name: Security and Supply Chain

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-security.txt
      - name: Install application and security tools
        run: pip install -r requirements.txt -r requirements-security.txt
      - name: Dependency vulnerability gate
        run: python -m pip_audit -r requirements.txt --strict
      - name: Static security gate
        # B608 findings are reviewed hard-coded allowlisted SQL fragments;
        # values remain parameterized and user-controlled identifiers are absent.
        run: bandit -q -r app -x app_data -ll -s B608
      - name: Generate reproducible Python CycloneDX SBOM
        run: |
          mkdir -p supply-chain
          cyclonedx-py requirements requirements.txt --output-reproducible --of JSON -o supply-chain/python-sbom.cdx.json
      - name: Generate canonical OpenAPI fingerprint
        env:
          APP_ENV: test
          SEED_DEMO_USER: "false"
          ENABLE_LIVE_EXECUTION: "false"
          ENABLE_TESTNET_EXECUTION: "false"
        run: python scripts/generate_openapi_fingerprint.py --output supply-chain/openapi-fingerprint.json
      - name: Upload backend supply-chain artifacts
        uses: actions/upload-artifact@v7
        with:
          name: apex-backend-supply-chain
          path: backend/supply-chain/
          retention-days: 30

  filesystem-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Generate Android source CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: android
          format: cyclonedx-json
          output-file: android-sbom.cdx.json
          upload-artifact: false
      - name: Upload Android SBOM
        uses: actions/upload-artifact@v7
        with:
          name: apex-android-sbom
          path: android-sbom.cdx.json
          retention-days: 30
