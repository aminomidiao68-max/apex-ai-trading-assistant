name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APEX_API_BASE_URL: ${{ vars.APEX_API_BASE_URL }}
      APEX_WS_BASE_URL: ${{ vars.APEX_WS_BASE_URL }}
      APEX_DEBUG_API_BASE_URL: ${{ vars.APEX_DEBUG_API_BASE_URL || vars.APEX_API_BASE_URL }}
      APEX_DEBUG_WS_BASE_URL: ${{ vars.APEX_DEBUG_WS_BASE_URL || vars.APEX_WS_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # ubuntu-latest already includes Android command-line tools. Avoid the
      # deprecated Node 20 setup-android action that intermittently failed
      # before Gradle even started.
      - name: Install Android API 35
        shell: bash
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager | head -n 1)"
          fi
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build, lint and test debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --max-workers=2 testDebugUnitTest lintDebug assembleDebug --stacktrace

      - name: Generate release provenance manifest
        working-directory: android
        env:
          APP_VERSION: 3.1.0-quant-alpha1
        run: |
          APK="$(find app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)"
          test -n "$APK"
          python3 ../backend/scripts/generate_release_manifest.py \
            --apk "$APK" \
            --output app/build/outputs/apk/debug/release-manifest.json

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: apex-ai-rc-debug-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/release-manifest.json
          retention-days: 30
