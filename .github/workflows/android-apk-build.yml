name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      APEX_API_BASE_URL: ${{ vars.APEX_API_BASE_URL }}
      APEX_WS_BASE_URL: ${{ vars.APEX_WS_BASE_URL }}
      APEX_DEBUG_API_BASE_URL: ${{ vars.APEX_DEBUG_API_BASE_URL || vars.APEX_API_BASE_URL }}
      APEX_DEBUG_WS_BASE_URL: ${{ vars.APEX_DEBUG_WS_BASE_URL || vars.APEX_WS_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build and test debug APK
        working-directory: android
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apex-ai-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
