name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      APEX_API_BASE_URL: ${{ vars.APEX_API_BASE_URL }}
      APEX_WS_BASE_URL: ${{ vars.APEX_WS_BASE_URL }}
      APEX_DEBUG_API_BASE_URL: ${{ vars.APEX_DEBUG_API_BASE_URL }}
      APEX_DEBUG_WS_BASE_URL: ${{ vars.APEX_DEBUG_WS_BASE_URL }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release-key.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore google-services.json if secret exists
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          fi

      - name: Restore release keystore if secret exists
        shell: bash
        run: |
          if [ -n "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/release-key.jks
          fi

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apex-ai-apks
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
