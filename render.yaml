services:
  - type: web
    name: apex-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Apex AI Trading API
      - key: APP_ENV
        value: production
      - key: DEFAULT_TIMEZONE
        value: UTC
      - key: ENABLE_LIVE_EXECUTION
        value: false
