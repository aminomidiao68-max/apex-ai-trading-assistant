services:
  - type: web
    name: apex-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Apex AI Trading API
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 3.0.0-alpha5
      - key: DEFAULT_TIMEZONE
        value: UTC
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      - key: SEED_DEMO_USER
        value: false
      - key: SESSION_TTL_HOURS
        value: 168
      - key: AI_PROVIDER
        value: deterministic
      - key: AI_EXTERNAL_ENABLED
        value: false
      - key: ENABLE_LIVE_EXECUTION
        value: false
